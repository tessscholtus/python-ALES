# ELTEN Customer Configuration
# Erft van base.yaml — alleen overrides staan hier.
# Surface treatment opties staan in surface-treatments.yaml.

customerName: "ELTEN"

prompt_options:
  max_signal_prompt_entries: 5

# Signal patterns — helpen de AI herkennen wat er op de tekening staat
signals:
  tolerated_lengths:
    - pattern: "±\\d+(?:[.,]\\d+)?"
      description: "Expliciete tolerance — ALLEEN naar toleratedLengths"
    - pattern: "\\+\\d+(?:[.,]\\d+)?/-\\d+(?:[.,]\\d+)?"
      description: "Asymmetrische tolerance — ALLEEN naar toleratedLengths"
    - pattern: "\\+\\d+(?:[.,]\\d+)?/\\-\\d+(?:[.,]\\d+)?"
      description: "Asymmetrische tolerance met min-teken — ALLEEN naar toleratedLengths"
    - pattern: "\\d+\\s*\\+\\d+(?:[.,]\\d+)?(?:/0)?"
      description: "Unilateral tolerance (e.g. 32 +1 or 32 +1/0) — ALLEEN naar toleratedLengths"

  holes:
    - pattern: "\\d+x\\s*Ø\\d+(?:[.,]\\d+)?"
      capture:
        type: "normal"
    - pattern: "\\d+x\\s*M\\d+(?:x\\d+(?:[.,]\\d+)?)?"
      capture:
        type: "tapped"
    - pattern: "Ø\\d+(?:[.,]\\d+)?.*H\\d+"
      capture:
        type: "normal"
        tolerance: "H-class fit"
    - pattern: "M\\d+(?:x\\d+(?:[.,]\\d+)?)?"
      capture:
        type: "tapped"

# Klant-specifieke prompt instructies
prompt_additions:
  surface_treatment:
    - "CRITICAL FOR ELTEN: The BOM table (bottom right) contains coating info mixed with part descriptions."
    - "Scan EVERY cell in the BOM table for coating keywords like 'coating dynamic', 'coating static', 'poedercoaten', 'verzinken', 'parelstralen'."
    - "If you find ANY coating keyword in the BOM, extract it as the surface treatment."
    - "DO NOT require a separate 'Finish' or 'Coating' column — the coating text appears directly in the BOM rows."

# Material pattern instructions for prompt
material_patterns:
  - "Look in BOM table for 'Material' or 'Materiaal' column"
  - "Extract actual material grade (304, 316L, S235), NOT generic type (Sheet, Plate, Tube)"
  - "Common formats: '304', 'RVS 304', 'S235JR', 'St37'"
  - "Ignore words like: Sheet, Plaat, Tube, Buis — these are NOT materials"
